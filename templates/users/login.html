{% extends 'base.html' %}
{% block title %}Kirish - E-Shop{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-4">
                <div class="card-header bg-dark text-white text-center py-4 rounded-top-4">
                    <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Kirish</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" name="username" placeholder="Username" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Parol</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" name="password" placeholder="Parol" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">
                            <i class="bi bi-box-arrow-in-right"></i> Kirish
                        </button>
                    </form>
                </div>
                <div class="card-footer text-center bg-light py-3 rounded-bottom-4">
                    <span class="text-muted">Akkauntingiz yo'qmi? </span>
                    <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Ro'yxatdan o'ting</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
